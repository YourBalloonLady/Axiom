  function initialiseEmailJs() {
    if (typeof window.emailjs === "undefined") {
      console.error("EmailJS failed to load.");
      return false;
    }

    window.emailjs.init({
      publicKey: EMAILJS_CONFIG.publicKey
    });

    return true;
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat("en-GB", {
      style: "currency",
      currency: "GBP"
    }).format(value);
  }

  function loadCart() {
    try {
      const savedCart =
        JSON.parse(
          localStorage.getItem(CART_STORAGE_KEY)
        );

      return Array.isArray(savedCart)
        ? savedCart
        : [];
    } catch (error) {
      console.error(
        "Unable to load basket:",
        error
      );

      return [];
    }
  }

  function getProductById(productId) {
    return PRODUCTS.find(
      (product) =>
        product.id === productId
    );
  }

  function cleanCart() {
    cart = cart
      .map((item) => {
        const product =
          getProductById(item.id);

        if (!product) {
          return null;
        }

        const safeQuantity =
          Math.max(
            1,
            Math.min(
              Number(item.quantity) || 1,
              product.stock
            )
          );

        return {
          id: product.id,
          quantity: safeQuantity
        };
      })
      .filter(Boolean);

    localStorage.setItem(
      CART_STORAGE_KEY,
      JSON.stringify(cart)
    );
  }

  function getSelectedDelivery() {
    const selectedOption =
      document.querySelector(
        'input[name="deliveryMethod"]:checked'
      );

    if (!selectedOption) {
      return {
        id: "tracked48",
        name: "Royal Mail Tracked 48",
        price: DELIVERY_PRICES.tracked48
      };
    }

    return {
      id: selectedOption.value,
      name:
        selectedOption.dataset.name ||
        "Royal Mail delivery",

      price:
        DELIVERY_PRICES[selectedOption.value] ??
        Number(selectedOption.dataset.price) ??
        0
    };
  }

  function calculateOrder() {
    const subtotal =
      cart.reduce(
        (total, item) => {
          const product =
            getProductById(item.id);

          if (!product) {
            return total;
          }

          return total +
            product.price *
            item.quantity;
        },
        0
      );

    const delivery =
      getSelectedDelivery();

    return {
      subtotal,
      delivery,
      total:
        subtotal +
        delivery.price
    };
  }

  function handleMissingImage(image) {
    image.onerror = null;
    image.src =
      "./images/axiom-logo-icon.png";

    image.style.padding =
      "14px";
  }

  function renderSummary() {
    if (
      !summaryItems ||
      !summarySubtotal ||
      !summaryDelivery ||
      !summaryTotal
    ) {
      throw new Error(
        "One or more checkout summary elements are missing."
      );
    }

    const order =
      calculateOrder();

    summaryItems.innerHTML =
      cart
        .map((item) => {
          const product =
            getProductById(item.id);

          if (!product) {
            return "";
          }

          return `
            <article class="summary-item">

              <img
                src="${product.image}"
                alt="${product.name}"
                class="summary-item-image"
                onerror="handleMissingImage(this)"
              >

              <div>

                <div class="summary-item-name">
                  ${product.name}
                </div>

                <div class="summary-item-meta">
                  ${product.strength} × ${item.quantity}
                </div>

              </div>

              <div class="summary-item-price">
                ${formatCurrency(
                  product.price *
                  item.quantity
                )}
              </div>

            </article>
          `;
        })
        .join("");

    summarySubtotal.textContent =
      formatCurrency(
        order.subtotal
      );

    summaryDelivery.textContent =
      formatCurrency(
        order.delivery.price
      );

    summaryTotal.textContent =
      formatCurrency(
        order.total
      );
  }

  function isValidUkPostcode(postcode) {
    const normalised =
      postcode
        .trim()
        .toUpperCase();

    const pattern =
      /^[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}$/;

    return pattern.test(normalised);
  }

  function normalisePostcode() {
    if (!postcodeInput) {
      return;
    }

    const rawValue =
      postcodeInput.value
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "");

    if (rawValue.length > 3) {
      postcodeInput.value =
        `${rawValue.slice(0, -3)} ${rawValue.slice(-3)}`;
    } else {
      postcodeInput.value =
        rawValue;
    }
  }

  function validateForm() {
    if (
      !checkoutForm ||
      !postcodeInput ||
      !researchDeclaration
    ) {
      return false;
    }

    normalisePostcode();

    if (
      !isValidUkPostcode(
        postcodeInput.value
      )
    ) {
      postcodeInput.setCustomValidity(
        "Enter a valid UK postcode."
      );
    } else {
      postcodeInput.setCustomValidity("");
    }

    let valid =
      checkoutForm.checkValidity();

    if (!researchDeclaration.checked) {
      if (declarationError) {
        declarationError.classList.add(
          "visible"
        );
      }

      valid = false;
    } else if (declarationError) {
      declarationError.classList.remove(
        "visible"
      );
    }

    checkoutForm.classList.add(
      "was-validated"
    );

    return valid;
  }

  function generateOrderReference() {
    const now =
      new Date();

    const datePart = [
      String(
        now.getFullYear()
      ).slice(-2),

      String(
        now.getMonth() + 1
      ).padStart(2, "0"),

      String(
        now.getDate()
      ).padStart(2, "0")
    ].join("");

    const randomPart =
      Math.floor(
        1000 +
        Math.random() * 9000
      );

    return `AX-${datePart}-${randomPart}`;
  }

  function formValue(fieldName) {
    if (!checkoutForm) {
      return "";
    }

    const field =
      checkoutForm.elements[
        fieldName
      ];

    return field
      ? field.value.trim()
      : "";
  }

  function createOrderObject() {
    const totals =
      calculateOrder();

    const reference =
      generateOrderReference();

    const orderItems =
      cart.map((item) => {
        const product =
          getProductById(item.id);

        if (!product) {
          throw new Error(
            `Product not found: ${item.id}`
          );
        }

        return {
          productId:
            product.id,

          name:
            product.name,

          strength:
            product.strength,

          price:
            product.price,

          quantity:
            item.quantity,

          lineTotal:
            product.price *
            item.quantity
        };
      });

    return {
      reference,
      status: "awaiting_payment",
      createdAt:
        new Date().toISOString(),

      customer: {
        firstName:
          formValue("firstName"),

        lastName:
          formValue("lastName"),

        email:
          formValue("email")
            .toLowerCase(),

        phone:
          formValue("phone")
      },

      deliveryAddress: {
        addressLine1:
          formValue("addressLine1"),

        addressLine2:
          formValue("addressLine2"),

        townCity:
          formValue("townCity"),

        county:
          formValue("county"),

        postcode:
          formValue("postcode")
            .toUpperCase(),

        country:
          formValue("country"),

        deliveryNotes:
          formValue("deliveryNotes")
      },

      delivery: {
        id:
          totals.delivery.id,

        name:
          totals.delivery.name,

        price:
          totals.delivery.price
      },

      items:
        orderItems,

      subtotal:
        totals.subtotal,

      total:
        totals.total,

      researchDeclarationAccepted:
        true
    };
  }

  function formatOrderItemsForEmail(items) {
    return items
      .map((item) => {
        return [
          `${item.name} ${item.strength}`,
          `Quantity: ${item.quantity}`,
          `Price each: ${formatCurrency(item.price)}`,
          `Line total: ${formatCurrency(item.lineTotal)}`
        ].join("\n");
      })
      .join("\n\n");
  }

  function formatAddress(address) {
    return [
      address.addressLine1,
      address.addressLine2,
      address.townCity,
      address.county,
      address.postcode,
      address.country
    ]
      .filter(Boolean)
      .join(", ");
  }

  async function sendOrderEmails(order) {
    if (
      typeof window.emailjs ===
      "undefined"
    ) {
      throw new Error(
        "EmailJS is not available."
      );
    }

    const formattedItems =
      formatOrderItemsForEmail(
        order.items
      );

    const formattedAddress =
      formatAddress(
        order.deliveryAddress
      );

    const customerTemplateParameters = {
      to_email:
        order.customer.email,

      customer_email:
        order.customer.email,

      customer_name:
        `${order.customer.firstName} ${order.customer.lastName}`,

      first_name:
        order.customer.firstName,

      order_reference:
        order.reference,

      order_status:
        "Awaiting payment",

      order_items:
        formattedItems,

      subtotal:
        formatCurrency(
          order.subtotal
        ),

      delivery_method:
        order.delivery.name,

      delivery_price:
        formatCurrency(
          order.delivery.price
        ),

      order_total:
        formatCurrency(
          order.total
        ),

      delivery_address:
        formattedAddress,

      delivery_notes:
        order.deliveryAddress
          .deliveryNotes ||
        "None",

      bank_account_name:
        BANK_DETAILS.accountName,

      bank_sort_code:
        BANK_DETAILS.sortCode,

      bank_account_number:
        BANK_DETAILS.accountNumber,

      payment_reference:
        order.reference,

      support_email:
        EMAILJS_CONFIG.adminEmail
    };

    const adminTemplateParameters = {
      to_email:
        EMAILJS_CONFIG.adminEmail,

      customer_name:
        `${order.customer.firstName} ${order.customer.lastName}`,

      first_name:
        order.customer.firstName,

      last_name:
        order.customer.lastName,

      customer_email:
        order.customer.email,

      customer_phone:
        order.customer.phone,

      order_reference:
        order.reference,

      order_status:
        "Awaiting payment",

      order_items:
        formattedItems,

      subtotal:
        formatCurrency(
          order.subtotal
        ),

      delivery_method:
        order.delivery.name,

      delivery_price:
        formatCurrency(
          order.delivery.price
        ),

      order_total:
        formatCurrency(
          order.total
        ),

      delivery_address:
        formattedAddress,

      address_line_1:
        order.deliveryAddress
          .addressLine1,

      address_line_2:
        order.deliveryAddress
          .addressLine2 ||
        "",

      town_city:
        order.deliveryAddress
          .townCity,

      county:
        order.deliveryAddress
          .county ||
        "",

      postcode:
        order.deliveryAddress
          .postcode,

      country:
        order.deliveryAddress
          .country,

      delivery_notes:
        order.deliveryAddress
          .deliveryNotes ||
        "None",

      research_declaration:
        order
          .researchDeclarationAccepted
          ? "Accepted"
          : "Not accepted",

      created_at:
        new Date(
          order.createdAt
        ).toLocaleString(
          "en-GB",
          {
            dateStyle: "full",
            timeStyle: "short"
          }
        )
    };

    const results =
      await Promise.allSettled([
        window.emailjs.send(
          EMAILJS_CONFIG.serviceId,
          EMAILJS_CONFIG
            .customerTemplateId,
          customerTemplateParameters
        ),

        window.emailjs.send(
          EMAILJS_CONFIG.serviceId,
          EMAILJS_CONFIG
            .adminTemplateId,
          adminTemplateParameters
        )
      ]);

    const customerResult =
      results[0];

    const adminResult =
      results[1];

    if (
      customerResult.status ===
        "rejected" ||
      adminResult.status ===
        "rejected"
    ) {
      console.error(
        "Customer email:",
        customerResult
      );

      console.error(
        "Admin email:",
        adminResult
      );

      throw new Error(
        "One or more confirmation emails failed."
      );
    }
  }

  function showConfirmation(order) {
    if (checkoutHero) {
      checkoutHero.style.display =
        "none";
    }

    if (checkoutMain) {
      checkoutMain.style.display =
        "none";
    }

    if (emptyCheckout) {
      emptyCheckout.style.display =
        "none";
    }

    if (confirmationSection) {
      confirmationSection.style.display =
        "block";
    }

    const confirmationReference =
      document.getElementById(
        "confirmationReference"
      );

    const confirmationReferenceDuplicate =
      document.getElementById(
        "confirmationReferenceDuplicate"
      );

    const confirmationAmount =
      document.getElementById(
        "confirmationAmount"
      );

    const confirmationCustomer =
      document.getElementById(
        "confirmationCustomer"
      );

    const confirmationEmail =
      document.getElementById(
        "confirmationEmail"
      );

    const confirmationDeliveryMethod =
      document.getElementById(
        "confirmationDeliveryMethod"
      );

    const confirmationAddress =
      document.getElementById(
        "confirmationAddress"
      );

    const confirmationTotal =
      document.getElementById(
        "confirmationTotal"
      );

    const bankAccountName =
      document.getElementById(
        "bankAccountName"
      );

    const bankSortCode =
      document.getElementById(
        "bankSortCode"
      );

    const bankAccountNumber =
      document.getElementById(
        "bankAccountNumber"
      );

    if (confirmationReference) {
      confirmationReference.textContent =
        order.reference;
    }

    if (
      confirmationReferenceDuplicate
    ) {
      confirmationReferenceDuplicate
        .textContent =
        order.reference;
    }

    if (confirmationAmount) {
      confirmationAmount.textContent =
        formatCurrency(
          order.total
        );
    }

    if (confirmationCustomer) {
      confirmationCustomer.textContent =
        `${order.customer.firstName} ${order.customer.lastName}`;
    }

    if (confirmationEmail) {
      confirmationEmail.textContent =
        order.customer.email;
    }

    if (
      confirmationDeliveryMethod
    ) {
      confirmationDeliveryMethod
        .textContent =
        order.delivery.name;
    }

    if (confirmationAddress) {
      confirmationAddress.textContent =
        formatAddress(
          order.deliveryAddress
        );
    }

    if (confirmationTotal) {
      confirmationTotal.textContent =
        formatCurrency(
          order.total
        );
    }

    if (bankAccountName) {
      bankAccountName.textContent =
        BANK_DETAILS.accountName;
    }

    if (bankSortCode) {
      bankSortCode.textContent =
        BANK_DETAILS.sortCode;
    }

    if (bankAccountNumber) {
      bankAccountNumber.textContent =
        BANK_DETAILS.accountNumber;
    }

    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }

  async function submitOrder(event) {
    event.preventDefault();

    if (orderSubmitted) {
      return;
    }

    if (!validateForm()) {
      const firstInvalid =
        checkoutForm.querySelector(
          ":invalid"
        );

      if (firstInvalid) {
        firstInvalid.focus();

        firstInvalid.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }

      return;
    }

    placeOrderButton.disabled =
      true;

    placeOrderButton.innerHTML = `
      <span
        class="spinner-border spinner-border-sm"
        aria-hidden="true"
      ></span>
      Submitting order
    `;

    try {
      const order =
        createOrderObject();

      await sendOrderEmails(order);

      localStorage.setItem(
        LAST_ORDER_STORAGE_KEY,
        JSON.stringify(order)
      );

      localStorage.removeItem(
        CART_STORAGE_KEY
      );

      cart = [];
      orderSubmitted = true;

      showConfirmation(order);
    } catch (error) {
      console.error(
        "Unable to submit order:",
        error
      );

      placeOrderButton.disabled =
        false;

      placeOrderButton.innerHTML = `
        Submit order
        <i class="bi bi-arrow-right"></i>
      `;

      alert(
        "Your order could not be submitted. Your basket has not been cleared. Please try again."
      );
    }
  }

  function showCheckoutLoadError(error) {
    console.error(
      "Checkout failed to initialise:",
      error
    );

    if (checkoutHero) {
      checkoutHero.style.display =
        "none";
    }

    if (checkoutMain) {
      checkoutMain.style.display =
        "none";
    }

    if (confirmationSection) {
      confirmationSection.style.display =
        "none";
    }

    if (emptyCheckout) {
      emptyCheckout.style.display =
        "flex";

      emptyCheckout.innerHTML = `
        <div>

          <i class="bi bi-exclamation-triangle"></i>

          <h1>
            Checkout could not load
          </h1>

          <p>
            The checkout encountered an error. Your basket has not been changed.
          </p>

          <a
            href="./shop.html"
            class="catalogue-button"
          >
            <i class="bi bi-arrow-left"></i>
            Return to catalogue
          </a>

        </div>
      `;
    }
  }

  function initialiseCheckout() {
    if (
      !checkoutHero ||
      !checkoutMain ||
      !checkoutForm ||
      !emptyCheckout ||
      !confirmationSection
    ) {
      throw new Error(
        "Required checkout HTML elements are missing."
      );
    }

    initialiseEmailJs();
    cleanCart();

    if (!cart.length) {
      checkoutHero.style.display =
        "none";

      checkoutMain.style.display =
        "none";

      confirmationSection.style.display =
        "none";

      emptyCheckout.style.display =
        "flex";

      return;
    }

    renderSummary();
  }

  document
    .querySelectorAll(
      'input[name="deliveryMethod"]'
    )
    .forEach((input) => {
      input.addEventListener(
        "change",
        renderSummary
      );
    });

  if (postcodeInput) {
    postcodeInput.addEventListener(
      "blur",
      () => {
        normalisePostcode();

        if (
          isValidUkPostcode(
            postcodeInput.value
          )
        ) {
          postcodeInput
            .setCustomValidity("");
        }
      }
    );

    postcodeInput.addEventListener(
      "input",
      () => {
        postcodeInput.value =
          postcodeInput.value
            .toUpperCase();

        postcodeInput
          .setCustomValidity("");
      }
    );
  }

  if (researchDeclaration) {
    researchDeclaration
      .addEventListener(
        "change",
        () => {
          if (declarationError) {
            declarationError
              .classList.toggle(
                "visible",
                !researchDeclaration
                  .checked
              );
          }
        }
      );
  }

  if (checkoutForm) {
    checkoutForm.addEventListener(
      "submit",
      submitOrder
    );
  }

  if (copyReferenceButton) {
    copyReferenceButton
      .addEventListener(
        "click",
        async () => {
          const referenceElement =
            document.getElementById(
              "confirmationReference"
            );

          if (!referenceElement) {
            return;
          }

          const reference =
            referenceElement.textContent;

          try {
            await navigator.clipboard
              .writeText(reference);

            copyReferenceButton.innerHTML = `
              <i class="bi bi-check2"></i>
              Copied
            `;

            window.setTimeout(() => {
              copyReferenceButton.innerHTML = `
                <i class="bi bi-copy"></i>
                Copy reference
              `;
            }, 1800);
          } catch (error) {
            console.error(
              "Unable to copy reference:",
              error
            );
          }
        }
      );
  }

  const currentYear =
    document.getElementById(
      "currentYear"
    );

  if (currentYear) {
    currentYear.textContent =
      new Date().getFullYear();
  }

  try {
    initialiseCheckout();
  } catch (error) {
    showCheckoutLoadError(error);
  }
</script>

</body>
</html>
